name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate app icon
        run: |
          python -c "
          from PIL import Image, ImageDraw
          s = 256
          img = Image.new('RGBA', (s, s), (0, 0, 0, 0))
          d = ImageDraw.Draw(img)
          d.rounded_rectangle([8, 8, s-8, s-8], radius=52, fill=(10, 16, 26, 255), outline=(30, 58, 82, 255), width=6)
          d.polygon([(78, 70), (78, 150), (150, 110)], fill=(45, 217, 245, 255))
          d.rounded_rectangle([150, 168, 178, 224], radius=8, fill=(255, 176, 32, 255))
          d.rounded_rectangle([190, 168, 218, 224], radius=8, fill=(61, 220, 132, 255))
          img.save('icon.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          print('icon ready')
          "

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "RAJ-VIDEO-SORTER" --icon icon.ico sorter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAJ-VIDEO-SORTER
          path: dist/RAJ-VIDEO-SORTER.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-build-${{ github.run_number }}
          name: RAJ VIDEO SORTER ${{ github.run_number }}
          files: dist/RAJ-VIDEO-SORTER.exe
